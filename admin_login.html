<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<div class="brand">College Asset Management System</div>
</div>

<main class="page-shell">
<section class="auth-card">
<h1>Admin Login</h1>
<p class="subtitle">Use your admin account to manage inventory and requests.</p>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST">
<label for="username">Username</label>
<input type="text" name="username" id="username" placeholder="Enter admin username" required>
<label for="password">Password</label>
<input type="password" name="password" id="password" placeholder="Enter password" required>
<button type="submit">Login as Admin</button>
</form>
<div class="action-row">
<a href="/" class="btn secondary">Back</a>
</div>
</section>
</main>

</body>
</html>
