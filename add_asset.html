<!DOCTYPE html>
<html>
<head>
<title>Add Asset</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<div class="brand">College Asset Management System</div>
</div>

<main class="page-shell">
<section class="card">
<h1>Add New Asset</h1>
<p class="subtitle">Add new inventory items to keep your asset catalog updated.</p>

<form method="POST">
<label for="name">Asset Name</label>
<input type="text" id="name" name="name" placeholder="Asset Name" required>
<label for="category">Category</label>
<input type="text" id="category" name="category" placeholder="Category" required>
<label for="location">Location</label>
<input type="text" id="location" name="location" placeholder="Location" required>
<button type="submit">Submit Asset</button>
</form>

<div class="action-row">
<a href="/admin" class="btn secondary">Back to Admin</a>
</div>
</section>
</main>

</body>
</html>
