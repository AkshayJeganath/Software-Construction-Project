<!DOCTYPE html>
<html>
<head>
<title>User Registration</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<div class="brand">College Asset Management System</div>
</div>

<main class="page-shell">
<section class="auth-card">
<h1>Create New Account</h1>
<p class="subtitle">Register as a user and start requesting assets right away.</p>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST">
<label for="username">Username</label>
<input type="text" name="username" id="username" placeholder="Choose a username" required>
<label for="full_name">Full Name</label>
<input type="text" name="full_name" id="full_name" placeholder="Your full name" required>
<label for="email">Email Address</label>
<input type="email" name="email" id="email" placeholder="you@example.com" required>
<label for="password">Password</label>
<input type="password" name="password" id="password" placeholder="Create a password" required>
<label for="confirm_password">Confirm Password</label>
<input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm your password" required>
<button type="submit">Register</button>
</form>
<p class="small-text">Already registered? <a href="/user_login">Sign in here</a>.</p>
<div class="action-row">
<a href="/" class="btn secondary">Back</a>
</div>
</section>
</main>

</body>
</html>
