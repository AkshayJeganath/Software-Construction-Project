<!DOCTYPE html>
<html>
<head>
<title>Return Asset</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<div class="brand">College Asset Management System</div>
</div>

<main class="page-shell">
<section class="card">
<h1>Return Asset</h1>
<p class="subtitle">Return assets that are currently assigned to you.</p>

{% if assets %}
<form method="POST">
<label for="asset_id">Select Asset to Return</label>
<select name="asset_id" id="asset_id" required>
{% for asset in assets %}
<option value="{{ asset.id }}">{{ asset.name }} - {{ asset.category }}</option>
{% endfor %}
</select>
<button type="submit">Return Asset</button>
</form>
{% else %}
<p>No assets assigned to you.</p>
{% endif %}

<div class="action-row">
<a href="/" class="btn secondary">Back to Dashboard</a>
</div>
</section>
</main>

</body>
</html>
