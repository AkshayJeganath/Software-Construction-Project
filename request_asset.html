<!DOCTYPE html>
<html>
<head>
<title>Request Asset</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
<div class="brand">College Asset Management System</div>
</div>

<main class="page-shell">
<section class="card">
<h1>Request Asset</h1>
<p class="subtitle">Submit a new request for an available asset.</p>
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<form method="POST">
<label for="asset_id">Select Asset</label>
<select name="asset_id" id="asset_id" required>
{% for asset in assets %}
<option value="{{ asset.id }}">{{ asset.name }} - {{ asset.category }}</option>
{% endfor %}
</select>
<label for="purpose">Purpose</label>
<input type="text" name="purpose" id="purpose" placeholder="Purpose" required>
<label for="duration">Duration</label>
<input type="text" name="duration" id="duration" placeholder="Duration" required>
<button type="submit">Request Asset</button>
</form>

<div class="action-row">
<a href="/" class="btn secondary">Back to Dashboard</a>
</div>
</section>
</main>

</body>
</html>
